<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atelier Najjar</title>
<style>
body{margin:0;font-family:Georgia,serif;background:#F5EDDA;color:#5E2C2C}
.section{max-width:900px;margin:auto}
.card{position:relative;margin-bottom:12px}
.card img{width:100%;display:block}
.overlay{position:absolute;bottom:0;left:0;width:100%;padding:24px;background:linear-gradient(to top, rgba(94,44,44,0.7), rgba(94,44,44,0));color:white}
.title{font-size:18px;letter-spacing:1px}
.subtitle{text-align:center;margin:40px 0 20px;font-size:14px;letter-spacing:3px;opacity:.6}
</style>
</head>
<body>
<div class="section">

<div class="card"><img src="hero.jpg"></div>

<div class="subtitle">MEZZE</div>
<div class="card"><img src="hommos.jpg"><div class="overlay"><div class="title">Hommos Grenade</div></div></div>
<div class="card"><img src="salade.jpg"><div class="overlay"><div class="title">Salade Levantine</div></div></div>
<div class="card"><img src="labne.jpg"><div class="overlay"><div class="title">Labné aux Agrumes</div></div></div>
<div class="card"><img src="taboule.jpg"><div class="overlay"><div class="title">Taboulé Citronné</div></div></div>
<div class="card"><img src="caviar.jpg"><div class="overlay"><div class="title">Caviar d'Aubergine Fumée</div></div></div>
<div class="card"><img src="vignes.jpg"><div class="overlay"><div class="title">Feuilles de Vignes</div></div></div>

<div class="subtitle">BOUCHÉES</div>
<div class="card"><img src="falafel.jpg"><div class="overlay"><div class="title">Falafels Signatures</div></div></div>
<div class="card"><img src="fatayer.jpg"><div class="overlay"><div class="title">Fatayer Épinards</div></div></div>
<div class="card"><img src="kebbe.jpg"><div class="overlay"><div class="title">Kebbe</div></div></div>
<div class="card"><img src="samboussek.jpg"><div class="overlay"><div class="title">Samboussek Fromage</div></div></div>

</div>
</body>
</html>
